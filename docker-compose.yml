version: "3.9"
services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - backend/.env
    depends_on:
      - db
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
  db:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: propertyguy
      POSTGRES_PASSWORD: propertyguy
      POSTGRES_DB: propertyguy
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
volumes:
  pg_data:
